<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>فضاء شاعري</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    
    .bg-layer {
      position: absolute;
      top: -10%;
      /* تم تقليل الإزاحة لتناسب التقريب الجديد */
      left: -10%;
      width: 120%;
      height: 120%;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      z-index: 1;
      will-change: transform;
    }
    
    /* تعديل التظليل هنا (من 0.35 إلى 0.2) */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.2);
      z-index: 2;
    }
    
    .poem-container {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 5;
      text-align: center;
      width: 90%;
      max-width: 600px;
      pointer-events: none;
      will-change: transform;
    }
    
    .poem-text {
      color: rgba(255, 255, 255, 0.98);
      font-family: 'Amiri', serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.8;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
      margin: 0;
      white-space: pre-wrap;
    }
    
    .audio-box {
      position: absolute;
      bottom: 80px;
      left: 50%;
      width: 85%;
      max-width: 340px;
      height: 56px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px) saturate(150%);
      -webkit-backdrop-filter: blur(25px) saturate(150%);
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      will-change: transform;
    }
    
    .play-btn {
      width: 35px;
      height: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    
    .play-icon {
      width: 0;
      height: 0;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 15px solid #fff;
      margin-left: 4px;
    }
    
    .pause-icon {
      display: none;
      gap: 5px;
    }
    
    .pause-bar {
      width: 4px;
      height: 16px;
      background: #fff;
      border-radius: 2px;
    }
    
    .track-info {
      flex-grow: 1;
      text-align: center;
      color: #fff;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding-left: 35px;
    }
  </style>
</head>

<body>
  
  <div id="scene">
    <div class="bg-layer" id="bgLayer"></div>
    <div class="overlay"></div>
    
    <div class="poem-container" id="poemContainer">
      <pre class="poem-text">إِنِّي رَأَيْتُ مِنَ العُيُونِ عَجَائِبًا
وَأَرَاكِ أَعْجَبَ مَا رَأَيْتُ عُيُونَا
​مَا كُنْتُ أَحْسَبُ أَنَّ طَرْفًا نَاعِسًا
قَدْ يُورِثُ العَقْلَ السَّلِيمَ جُنُونَا</pre>
    </div>
    
    <div class="audio-box" id="audioBox">
      <div class="play-btn" id="playBtn">
        <div class="play-icon" id="playIcon"></div>
        <div class="pause-icon" id="pauseIcon">
          <div class="pause-bar"></div>
          <div class="pause-bar"></div>
        </div>
      </div>
      <div class="track-info">Golden brown</div>
    </div>
  </div>
  
  <audio id="myAudio" loop>
    <source src="goldenbrown.mp3" type="audio/mpeg">
  </audio>
  
  <script>
    const bg = document.getElementById('bgLayer');
    const poem = document.getElementById('poemContainer');
    const audioBox = document.getElementById('audioBox');
    const playBtn = document.getElementById('playBtn');
    const audio = document.getElementById('myAudio');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    
    let targetX = 0,
      targetY = 0;
    let currentX = 0,
      currentY = 0;
    let autoMoveTime = 0;
    
    function update() {
      autoMoveTime += 0.002;
      let autoX = Math.sin(autoMoveTime) * 4;
      let autoY = Math.cos(autoMoveTime * 1) * 4;
      
      currentX += ((targetX + autoX) - currentX) * 0.03;
      currentY += ((targetY + autoY) - currentY) * 0.03;
      
      // تم تعديل الـ scale من 1.15 إلى 1.05 لتقليل التقريب
      bg.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) scale(1.00)`;
      
      poem.style.transform = `translate3d(calc(-50% + ${-currentX * 0.4}px), calc(-50% + ${-currentY * 0.4}px), 0)`;
      audioBox.style.transform = `translate3d(calc(-50% + ${-currentX * 0.7}px), ${-currentY * 0.7}px, 0)`;
      
      requestAnimationFrame(update);
    }
    
    window.addEventListener('deviceorientation', (e) => {
      if (e.gamma !== null && e.beta !== null) {
        let x = e.gamma;
        let y = e.beta - 45;
        
        // تقليل المدى الأقصى للحركة ليتناسب مع التقريب الصغير
        targetX = Math.max(Math.min(x * 0.4, 15), -15);
        targetY = Math.max(Math.min(y * 0.4, 15), -15);
      }
    });
    
    let isPlaying = false;
    playBtn.onclick = (e) => {
      e.stopPropagation();
      if (!isPlaying) {
        audio.play().catch(err => console.log("التشغيل يتطلب تفاعل المستخدم"));
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'flex';
      } else {
        audio.pause();
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      }
      isPlaying = !isPlaying;
    };
    
    document.body.onclick = () => {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().catch(console.error);
      }
    };
    
    update();
  </script>
</body>

</html>
